<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Privacy Policy</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="bg-animation">
  <div class="glow"></div>
  <div class="glow"></div>
</div>

<header>
  <div class="container">

    <h1 class="logo">
      Privacy Policy
    </h1>

    <nav>
      <a href="index.html">Home</a>
      <a href="terms.html">Terms</a>

      <button class="theme-toggle" id="themeToggle">
        ☾
      </button>
    </nav>

  </div>
</header>

<section class="page">

  <div class="container card">

    <h2>Information Collection</h2>

    <p>
      We may collect basic user data such as email and usage information.
    </p>

    <h2>How We Use Data</h2>

    <p>
      Data helps improve our services and security.
    </p>

    <h2>Contact</h2>

    <p>
      support@example.com
    </p>

  </div>

</section>

<footer>
  <p>
    © 2026 Wings ALL Rights Reserved.
  </p>
</footer>

<script>
const toggle = document.getElementById("themeToggle");

toggle.onclick = () => {

  document.body.classList.toggle("dark");

  if(document.body.classList.contains("dark")){
    toggle.innerHTML = "☀";
  }else{
    toggle.innerHTML = "☾";
  }

};
</script>

</body>
</html>
