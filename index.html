<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wings System</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="bg-animation">
  <div class="glow"></div>
  <div class="glow"></div>
</div>

<header>
  <div class="container">

<a 
  href="https://wing-system.vercel.app" 
  class="logo"
  target="_blank"
>
  Wings System
</a>

    <nav>
      <a href="terms.html">Terms</a>
      <a href="privacy.html">Privacy</a>

      <button class="theme-toggle" id="themeToggle">
        ☾
      </button>
    </nav>

  </div>
</header>

<section class="hero">

  <div class="container hero-content">

    <h2>
      Wings Information
    </h2>

    <p>
      Official Terms of Service and Privacy Policy.
    </p>

    <div class="buttons">

      <a class="btn" href="terms.html">
        Terms of Service
      </a>

      <a class="btn secondary" href="privacy.html">
        Privacy Policy
      </a>

    </div>

  </div>

</section>

<footer>
  <p>
    © 2026 Wings ALL Rights Reserved.
  </p>
</footer>

<script>
const toggle = document.getElementById("themeToggle");

toggle.onclick = () => {

  document.body.classList.toggle("dark");

  if(document.body.classList.contains("dark")){
    toggle.innerHTML = "☀";
  }else{
    toggle.innerHTML = "☾";
  }

};
</script>

</body>
</html>
